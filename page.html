<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NASA Space Dashboard</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div class="dashboard-container">
      <header>
        <h1 id="apod-title">Lade Weltraumdaten...</h1>
        <div class="controls">
          <label for="date-picker">Reise durch die Zeit:</label>
          <input type="date" id="date-picker">
        </div>
      </header>

      <main class="content-card">
        <div class="border-decor left"></div>
        <div class="inner-content">
          <div id="media-container"></div>
          <p id="apod-explanation">Verbindung zur NASA wird hergestellt...</p>
        </div>
        <div class="border-decor right"></div>
      </main>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
